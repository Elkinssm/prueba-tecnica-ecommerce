spring:
  datasource:
    url: jdbc:h2:mem:ordersdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  jpa:
    hibernate:
      ddl-auto: validate
      show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        generate_statistics: false
        # Performance optimizations
        jdbc:
          batch_size: 20
          order_inserts: true
          order_updates: true
        # Cache configuration
        cache:
          use_second_level_cache: false
          use_query_cache: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      adjust-dates-to-context-time-zone: false
  # Redis configuration for distributed cache (REQUIRED BY SPECS)
  redis:
    host: localhost
    port: 6379
    timeout: 2000ms
    jedis:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms
  cache:
    type: redis
    redis:
      time-to-live: 30m
      cache-null-values: false
  h2:
    console:
      enabled: true
      path: /h2-console
  server:
    port: 8080

# Actuator configuration for health checks and monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    defaults:
      enabled: true
    redis:
      enabled: true # Enable Redis health check

logging:
  level:
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    org.example.pruebatecnicaecommerce: INFO

jwt:
  secret: myVerySecretKeyForJWTAuthenticationThatMustBeAtLeast256BitsLong
  expiration: 86400
